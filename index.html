<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ZC RepRadar | EcoVadis 永續評分診斷</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Sans+TC:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#022e15;
  --green:#5e8c61;
  --light:#f9fbf9;
  --white:#ffffff;
  --body:#0f2318;
  --border:#e0e0e0;
  --muted:#4a6e52;
  --kpi-sub:#c8ddc8;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  font-family:'IBM Plex Sans TC',sans-serif;
  background:var(--light);color:var(--body);
  width:100%;min-height:100vh;overflow-x:hidden;
}

/* TOPBAR */
.topbar{
  background:var(--navy);border-bottom:2px solid var(--green);
  padding:14px 32px;display:flex;align-items:center;justify-content:space-between;
}
.brand{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:#fff;letter-spacing:.04em}
.brand span{color:var(--green)}
.brand-sub{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#a8c4a8;margin-top:2px}
.topbar-right{display:flex;align-items:center;gap:12px}
.fw-badge{
  font-family:'IBM Plex Mono',monospace;font-size:10px;
  padding:4px 10px;border-radius:20px;
  border:1px solid rgba(94,140,97,.5);color:var(--kpi-sub);letter-spacing:.06em;
}
.btn-reset-top{
  display:none;background:transparent;
  border:1px solid rgba(94,140,97,.5);border-radius:7px;
  padding:5px 13px;font-family:'IBM Plex Sans TC',sans-serif;
  font-size:12px;color:#a8c4a8;cursor:pointer;transition:all .15s;
}
.btn-reset-top:hover{border-color:var(--green);color:#fff}
.btn-dl-top{
  display:none;align-items:center;gap:6px;
  background:var(--green);border:none;border-radius:7px;
  padding:6px 14px;font-family:'IBM Plex Sans TC',sans-serif;
  font-size:12px;color:#fff;cursor:pointer;font-weight:600;
}

/* MAIN */
.main{max-width:720px;margin:0 auto;padding:36px 24px 80px}
.page-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;color:var(--navy);margin-bottom:6px}
.page-sub{font-size:13px;color:var(--muted);margin-bottom:28px;line-height:1.7}

/* STEP CARD */
.step-card{
  background:var(--white);border:1px solid var(--border);
  border-radius:12px;padding:26px 30px;margin-bottom:14px;
}
.step-num{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--green);margin-bottom:4px}
.step-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--navy);margin-bottom:16px}

/* BAND BUTTONS */
.bands{display:flex;flex-direction:column;gap:8px}
.band-btn{
  width:100%;background:var(--light);border:1px solid var(--border);
  border-radius:9px;padding:12px 16px;
  display:flex;align-items:center;gap:12px;
  cursor:pointer;transition:all .15s;text-align:left;
  font-family:'IBM Plex Sans TC',sans-serif;
}
.band-btn:hover{border-color:var(--green);background:#f0f7f0}
.band-emoji{font-size:18px;flex-shrink:0}
.band-label{font-size:13px;font-weight:500;color:var(--body)}

/* UPLOAD */
.upload-zone{
  border:2px dashed var(--border);border-radius:10px;
  padding:28px 20px;text-align:center;cursor:pointer;
  transition:all .2s;position:relative;
}
.upload-zone:hover{border-color:var(--green);background:#f0f7f0}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-icon{font-size:26px;margin-bottom:6px}
.upload-text{font-size:13px;color:var(--body);font-weight:500}
.upload-hint{font-size:11px;color:var(--muted);margin-top:3px}

/* CHAT AREA */
#chat-area{display:none}
#messages{padding:4px 0 100px;display:flex;flex-direction:column;gap:14px}

.msg-user{display:flex;justify-content:flex-end}
.msg-user .bubble{
  background:var(--navy);color:#e8f0e8;
  border-radius:14px 4px 14px 14px;
  padding:11px 16px;font-size:13px;line-height:1.7;
  max-width:78%;
}
.msg-ai{display:flex;flex-direction:column;gap:0}
.msg-ai-inner{display:flex;gap:10px}
.ai-avatar{
  width:28px;height:28px;border-radius:7px;font-size:13px;
  background:var(--green);color:#fff;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:2px;font-family:'Syne',sans-serif;font-weight:700;
}
.bubble-ai{
  background:var(--white);border:1px solid var(--border);
  border-radius:4px 14px 14px 14px;
  padding:11px 16px;font-size:13px;line-height:1.75;color:var(--body);
  max-width:78%;
}
.bubble-ai p{margin:2px 0}
.line-numbered{margin:4px 0!important;padding-left:10px;border-left:2px solid var(--green)}
.line-bullet{margin:2px 0!important;padding-left:14px;color:var(--muted)}
.line-header{margin:6px 0 2px!important;font-family:'Syne',sans-serif;font-weight:700;color:var(--navy)}

/* CHOICES */
.choices{margin-left:38px;margin-top:8px;display:flex;flex-wrap:wrap;gap:7px}
.choice-btn{
  background:var(--light);border:1px solid var(--border);
  border-radius:20px;padding:6px 14px;font-size:12px;
  color:var(--body);cursor:pointer;transition:all .15s;
  font-family:'IBM Plex Sans TC',sans-serif;font-weight:500;
}
.choice-btn:hover{border-color:var(--green);background:#f0f7f0;color:var(--navy)}

/* TYPING */
#typing{display:none;gap:10px;align-items:center;padding:4px 0}
.dot-wrap{
  background:var(--white);border:1px solid var(--border);
  border-radius:4px 14px 14px 14px;padding:12px 16px;
  display:flex;gap:5px;
}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 1.2s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,100%{opacity:.25;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}

/* DOWNLOAD BANNER */
.dl-banner{
  margin-left:38px;max-width:calc(78% + 38px);
  background:#f0f7f0;border:1px solid #a7c4a7;
  border-radius:10px;padding:16px 18px;margin-top:10px;
}
.dl-banner-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--navy);margin-bottom:5px}
.dl-banner-desc{font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:12px}
.btn-download{
  display:inline-flex;align-items:center;gap:7px;
  background:var(--navy);border:none;border-radius:8px;
  padding:9px 18px;color:#fff;font-size:12px;font-weight:600;
  cursor:pointer;font-family:'IBM Plex Sans TC',sans-serif;transition:all .2s;
}
.btn-download:hover{background:#033d1c}
.btn-download.done{background:var(--green)}

/* REFERRAL CARD */
.referral-card{
  margin-left:38px;max-width:calc(78% + 38px);
  background:var(--white);border:1px solid var(--border);
  border-radius:12px;padding:20px 22px;margin-top:10px;
}
.ref-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--navy);margin-bottom:4px;display:flex;align-items:center;gap:8px}
.ref-desc{font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.7}
.plan-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
@media(max-width:600px){.plan-grid{grid-template-columns:1fr}}
.plan{
  border:1px solid var(--border);border-radius:9px;padding:13px 15px;
  transition:border-color .15s;
}
.plan.featured{border-color:var(--green);background:#f0f7f0}
.plan-header{display:flex;align-items:center;gap:7px;margin-bottom:8px}
.plan-icon{font-size:16px}
.plan-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--navy)}
.plan-sub{font-size:11px;color:var(--muted);margin-bottom:8px}
.plan-tags{display:flex;flex-direction:column;gap:4px}
.plan-tag{
  font-size:11px;color:var(--muted);padding-left:10px;
  border-left:2px solid var(--green);line-height:1.5;
}
.ref-tip{
  background:#fffbf0;border:1px solid #f0e080;border-radius:8px;
  padding:11px 14px;font-size:12px;color:#7a6000;line-height:1.7;margin-bottom:14px;
}
.btn-email{
  display:inline-flex;align-items:center;gap:7px;
  background:var(--navy);border:none;border-radius:8px;
  padding:10px 20px;color:#fff;font-size:13px;font-weight:600;
  text-decoration:none;transition:background .15s;font-family:'IBM Plex Sans TC',sans-serif;
}
.btn-email:hover{background:#033d1c}

/* INPUT BAR */
#input-bar{
  display:none;position:sticky;bottom:0;padding:10px 0 18px;
  background:linear-gradient(to top,var(--light) 70%,transparent);
  flex-direction:column;gap:7px;
}
#preview-wrap{
  display:none;align-items:center;gap:9px;
  background:var(--white);border:1px solid var(--border);
  border-radius:8px;padding:7px 12px;
}
#preview-wrap img{width:36px;height:36px;object-fit:cover;border-radius:5px}
#preview-name{color:var(--navy);flex:1;font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#preview-rm{background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px}
.input-row{
  display:flex;gap:8px;background:var(--white);
  border:1px solid var(--border);border-radius:10px;
  padding:7px 7px 7px 14px;
  box-shadow:0 2px 8px rgba(2,46,21,.06);
}
.upload-icon-label{
  display:flex;align-items:center;justify-content:center;
  width:32px;height:32px;border-radius:7px;flex-shrink:0;font-size:15px;
  background:var(--light);border:1px solid var(--border);cursor:pointer;
  transition:border-color .15s;
}
.upload-icon-label:hover{border-color:var(--green)}
#text-input{
  flex:1;background:transparent;border:none;color:var(--body);
  font-size:13px;outline:none;font-family:'IBM Plex Sans TC',sans-serif;
}
#text-input::placeholder{color:#94a394}
#send-btn{
  background:var(--border);border:none;border-radius:7px;
  padding:7px 16px;color:var(--muted);font-size:12px;
  cursor:pointer;font-family:'IBM Plex Sans TC',sans-serif;
  font-weight:600;transition:all .15s;
}
#send-btn.active{background:var(--navy);color:#fff}
#send-btn.active:hover{background:#033d1c}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div>
    <div class="brand">ZC <span>RepRadar</span></div>
    <div class="brand-sub">ECOVADIS SUSTAINABILITY SCORE DIAGNOSTIC</div>
  </div>
  <div class="topbar-right">
    <span class="fw-badge">EcoVadis 2024</span>
    <button class="btn-dl-top" id="btn-dl-top" onclick="triggerDownload()">⬇ 下載報告</button>
    <button class="btn-reset-top" id="btn-reset-top" onclick="resetAll()">↩ 重新診斷</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div id="landing">
    <div class="page-title">EcoVadis 永續評分診斷</div>
    <div class="page-sub">3–5 個問題，快速找出您的評分瓶頸。診斷完成後可下載報告，聯繫 ZC 顧問時一併夾帶。</div>

    <!-- Upload -->
    <div class="step-card">
      <div class="step-num">Step 01</div>
      <div class="step-title">已有評估報告？直接上傳截圖讓 AI 分析</div>
      <div class="upload-zone" id="upload-zone">
        <input type="file" accept="image/*" id="file-landing" onchange="handleLandingUpload(event)"/>
        <div class="upload-icon">📎</div>
        <div class="upload-text">點擊或拖曳上傳 EcoVadis 報告截圖</div>
        <div class="upload-hint">支援 JPG / PNG / WEBP</div>
      </div>
    </div>

    <!-- Score bands -->
    <div class="step-card">
      <div class="step-num">Step 02</div>
      <div class="step-title">或選擇目前分數區間開始診斷</div>
      <div class="bands" id="bands"></div>
    </div>
  </div>

  <!-- Chat -->
  <div id="chat-area">
    <div id="messages"></div>
    <div id="typing">
      <div class="ai-avatar">ZC</div>
      <div class="dot-wrap">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
    </div>
  </div>

  <!-- Input bar -->
  <div id="input-bar">
    <div id="preview-wrap">
      <img id="preview-img" src="" alt=""/>
      <span id="preview-name"></span>
      <button id="preview-rm" onclick="removePreview()">✕</button>
    </div>
    <div class="input-row">
      <label class="upload-icon-label" title="上傳圖片">
        📎<input type="file" accept="image/*" id="file-chat" style="display:none" onchange="handleChatUpload(event)"/>
      </label>
      <input type="text" id="text-input" placeholder="點選選項，或自由補充說明…"
        oninput="syncSendBtn()"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"/>
      <button id="send-btn" onclick="sendMsg()">送出</button>
    </div>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `你是 ZC 顧問公司的 EcoVadis 永續顧問 AI，負責初步診斷客戶的 EcoVadis 評分現況。

EcoVadis 獎牌等級：
• 0–44分：無獎牌　• 45–54分：銅牌　• 55–64分：銀牌　• 65–74分：金牌　• 75+分：白金

四大評分主題：環境 / 勞工與人權 / 商業道德 / 永續採購
評分三層次：政策（Policy）、行動（Actions）、結果（Results）

【你的角色定位】
你只做「初步診斷」，找出問題核心，然後介紹 ZC 顧問服務。
不要把完整解法說完——點出問題後，引導客戶聯繫 ZC 顧問獲得專業協助。

ZC 提供兩種方案：
1. 基礎方案：差距盤點與行動計畫（自我檢核型）
2. 進階方案：評分提升實作支援（全方位輔導型）

【診斷流程 — 嚴格遵守】
第 1–3 輪：每次問一個問題收集資訊（行業別、企業規模、目前最薄弱面向）
第 4 輪：給出初步診斷摘要，點出 2–3 個關鍵問題，但不提供完整解法，結尾說「完整報告已為您產出，建議下載後夾帶給 ZC 顧問，加速後續服務。」
第 5 輪起：showReferral 設為 true

【輸出格式】嚴格輸出 JSON，不得有其他文字：
{
  "message": "回應內容，用 \\n 換行",
  "choices": ["選項1", "選項2"],
  "showReferral": false,
  "diagnosisSummary": "",
  "reportData": null
}

當 showReferral 為 true 時，reportData 必須填入：
{
  "scoreBand": "分數區間文字",
  "industry": "行業別",
  "companySize": "企業規模",
  "weakAreas": ["薄弱面向1", "薄弱面向2"],
  "keyIssues": [
    { "area": "面向名稱", "issue": "問題描述（1–2句）", "urgency": "高/中/低" }
  ],
  "nextSteps": ["建議行動1", "建議行動2", "建議行動3"]
}

- choices：需要客戶選擇時給 2–5 個選項，否則 []
- 選項文字不超過 20 字`;

const SCORE_BANDS = [
  { label:"尚未評估（準備首次申請）", color:"#607d8b", emoji:"🆕" },
  { label:"低於 45 分（無獎牌）",      color:"#c0392b", emoji:"⬜" },
  { label:"45–54 分（銅牌 Bronze）",   color:"#b45309", emoji:"🥉" },
  { label:"55–64 分（銀牌 Silver）",   color:"#607d8b", emoji:"🥈" },
  { label:"65–74 分（金牌 Gold）",     color:"#b8860b", emoji:"🥇" },
  { label:"75 分以上（白金 Platinum）",color:"#5e8c61", emoji:"💎" },
];

let history=[], reportState=null, pendingImg=null, isLoading=false;

// Build bands
var bandsEl = document.getElementById("bands");
SCORE_BANDS.forEach(function(b){
  var btn = document.createElement("button");
  btn.className = "band-btn";
  btn.style.borderLeft = "3px solid " + b.color;
  btn.innerHTML = '<span class="band-emoji">'+b.emoji+'</span><span class="band-label">'+b.label+'</span>';
  btn.onmouseenter = function(){ btn.style.borderColor = b.color; };
  btn.onmouseleave = function(){ btn.style.borderColor = ""; btn.style.borderLeft = "3px solid "+b.color; };
  btn.onclick = function(){ startWithBand(b); };
  bandsEl.appendChild(btn);
});

function showChat(){
  document.getElementById("landing").style.display = "none";
  document.getElementById("chat-area").style.display = "block";
  document.getElementById("input-bar").style.display = "flex";
  document.getElementById("btn-reset-top").style.display = "block";
}

function startWithBand(band){
  showChat();
  addUserMsg("我們目前的 EcoVadis 分數區間是："+band.label, null, null);
  callClaude();
}

function handleLandingUpload(e){
  var file=e.target.files[0]; if(!file) return;
  var reader=new FileReader();
  reader.onload=function(){
    var base64=reader.result.split(",")[1];
    var type=file.type.startsWith("image")?file.type:"image/jpeg";
    showChat();
    addUserMsg("（已上傳 EcoVadis 評估報告截圖，請分析現況並初步診斷）", base64, type);
    callClaude();
  };
  reader.readAsDataURL(file);
  e.target.value="";
}

function handleChatUpload(e){
  var file=e.target.files[0]; if(!file) return;
  var reader=new FileReader();
  reader.onload=function(){
    var base64=reader.result.split(",")[1];
    var type=file.type.startsWith("image")?file.type:"image/jpeg";
    pendingImg={base64:base64,type:type,name:file.name};
    document.getElementById("preview-wrap").style.display="flex";
    document.getElementById("preview-img").src=reader.result;
    document.getElementById("preview-name").textContent=file.name;
    syncSendBtn();
  };
  reader.readAsDataURL(file);
  e.target.value="";
}

function removePreview(){
  pendingImg=null;
  document.getElementById("preview-wrap").style.display="none";
  syncSendBtn();
}

function sendMsg(text){
  var msg=text||document.getElementById("text-input").value.trim();
  if((!msg&&!pendingImg)||isLoading) return;
  document.getElementById("text-input").value="";
  var content=msg||"（補充上傳圖片）";
  if(pendingImg){ addUserMsg(content,pendingImg.base64,pendingImg.type); pendingImg=null; document.getElementById("preview-wrap").style.display="none"; }
  else { addUserMsg(content,null,null); }
  syncSendBtn();
  callClaude();
}

function syncSendBtn(){
  var btn=document.getElementById("send-btn");
  var ok=document.getElementById("text-input").value.trim()||pendingImg;
  btn.className=(ok&&!isLoading)?"active":"";
}

function resetAll(){
  history=[]; reportState=null; pendingImg=null;
  document.getElementById("messages").innerHTML="";
  document.getElementById("chat-area").style.display="none";
  document.getElementById("landing").style.display="block";
  document.getElementById("input-bar").style.display="none";
  document.getElementById("btn-reset-top").style.display="none";
  document.getElementById("btn-dl-top").style.display="none";
  document.getElementById("preview-wrap").style.display="none";
  document.getElementById("text-input").value="";
}

function addUserMsg(content, b64, type){
  history.push({role:"user",content:content,imageBase64:b64,imageType:type});
  var row=document.createElement("div"); row.className="msg-user";
  var bubble=document.createElement("div"); bubble.className="bubble";
  if(b64){
    var img=document.createElement("img");
    img.src="data:"+type+";base64,"+b64;
    img.style.cssText="max-width:100%;max-height:140px;border-radius:6px;margin-bottom:7px;display:block";
    bubble.appendChild(img);
  }
  bubble.appendChild(document.createTextNode(content));
  row.appendChild(bubble);
  document.getElementById("messages").appendChild(row);
  scrollBottom();
}

function addAIMsg(parsed){
  history.push({role:"assistant",content:parsed.message});
  var row=document.createElement("div"); row.className="msg-ai";
  var inner=document.createElement("div"); inner.className="msg-ai-inner";
  var av=document.createElement("div"); av.className="ai-avatar"; av.textContent="ZC";
  var bubble=document.createElement("div"); bubble.className="bubble-ai";
  renderText(bubble, parsed.message);
  inner.appendChild(av); inner.appendChild(bubble); row.appendChild(inner);

  if(parsed.choices&&parsed.choices.length>0&&!parsed.showReferral){
    var ch=document.createElement("div"); ch.className="choices";
    parsed.choices.forEach(function(c){
      var btn=document.createElement("button"); btn.className="choice-btn";
      btn.textContent=c; btn.onclick=function(){ sendMsg(c); };
      ch.appendChild(btn);
    });
    row.appendChild(ch);
  }

  if(parsed.showReferral&&parsed.reportData){
    reportState={data:parsed.reportData,summary:parsed.diagnosisSummary||""};

function renderText(el, text){
  text.split("\n").forEach(function(line){
    var p=document.createElement("p");
    if(/^\d+[.、]/.test(line)){p.className="line-numbered";p.textContent=line;}
    else if(/^[•\-・]/.test(line)){p.className="line-bullet";p.textContent=line;}
    else if(/^【.+】/.test(line)||/^\*\*.+\*\*$/.test(line)){p.className="line-header";p.textContent=line.replace(/\*\*/g,"");}
    else if(line===""){p.style.height="6px";}
    else{p.textContent=line;}
    el.appendChild(p);
  });
}

async function callClaude(){
  isLoading=true; syncSendBtn();
  var typing=document.getElementById("typing"); typing.style.display="flex";
  scrollBottom();
  var apiMessages=history.map(function(m){
    if(m.imageBase64){
      return{role:m.role,content:[
        {type:"image",source:{type:"base64",media_type:m.imageType||"image/jpeg",data:m.imageBase64}},
        {type:"text",text:m.content}
      ]};
    }
    return{role:m.role,content:m.content};
  });
  try{
    var res=await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1500,system:SYSTEM_PROMPT,messages:apiMessages})
    });
    var data=await res.json();
    var raw=(data.content&&data.content[0]&&data.content[0].text)||'{"message":"抱歉，請稍後再試。","choices":[],"showReferral":false,"reportData":null}';
    var parsed;
    try{parsed=JSON.parse(raw.replace(/```json|```/g,"").trim());}
    catch(e){parsed={message:raw,choices:[],showReferral:false,reportData:null};}
    typing.style.display="none";
    addAIMsg(parsed);
  }catch(e){
    typing.style.display="none";
    addAIMsg({message:"連線錯誤，請重試。",choices:[],showReferral:false,reportData:null});
  }
  isLoading=false; syncSendBtn();
}
